<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        Flashcards
    </title>

    <link
        rel="stylesheet"
        href="css/flashcards.css">

</head>

<body>

<div class="container">

    <h1>
        📚 AI Flashcards
    </h1>

    <div
        id="flashcardContainer">

        <div
            class="card"
            id="flashcard">

            Upload a PDF first.

        </div>

    </div>

    <br>

    <button
        onclick="previousCard()">

        Previous

    </button>

    <button
        onclick="flipCard()">

        Flip

    </button>

    <button
        onclick="nextCard()">

        Next

    </button>

</div>

<script src="js/flashcards.js"></script>

</body>

</html>
