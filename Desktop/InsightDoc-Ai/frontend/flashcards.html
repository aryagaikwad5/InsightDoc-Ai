<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        Flashcards
    </title>

    <link
        rel="stylesheet"
        href="css/flashcards.css">

</head>

<body>

<div class="container">

    <div class="hero">

        <h1>
            📚 AI Flashcards
        </h1>

        <p>
            Learn faster using AI-generated flashcards from your study material.
        </p>

    </div>


    <div class="card-section">

        <div
            class="card"
            id="flashcard">

            Upload a PDF first.

        </div>

        <div
            id="cardCounter"
            class="card-counter">

            Card 0 / 0

        </div>

    </div>


    <div class="controls">

        <button
            class="secondary-btn"
            onclick="previousCard()">

            ⬅ Previous

        </button>

        <button
            class="primary-btn"
            onclick="flipCard()">

            🔄 Flip Card

        </button>

        <button
            class="secondary-btn"
            onclick="nextCard()">

            Next ➡

        </button>

    </div>


    <div class="dashboard-box">

        <p>

            Need other study tools?

        </p>

        <button
            class="dashboard-btn"
            onclick="window.location.href='dashboard.html'">

            🏠 Back to Dashboard

        </button>

    </div>

</div>

<script src="js/flashcards.js"></script>

</body>

</html>
