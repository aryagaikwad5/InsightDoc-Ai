<!DOCTYPE html>
<html>

<head>

    <title>InsightDoc AI Login</title>

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">

            InsightDoc AI <br>

            <span>

                Learn Smarter with AI

            </span>

        </div>

        <form id="loginForm">

            <div class="input-group">

                <label>Username</label>

                <input
                    type="text"
                    id="username"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    required
                >

            </div>

            <button class="btn type="submit">
                Login
            </button>

        </form>

        <div class="message" id="message"></div>
        <div class="link">
            Don't have an account?
            <a href="register.html">
                Create Account
            </a>
        </div>

    </div>

</div>

<script src="js/auth.js"></script>



</body>
</html>
