<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        AI Quiz
    </title>

    <link
        rel="stylesheet"
        href="css/quiz.css">

</head>

<body>

<div class="container">

    <div class="hero">

        <h1>
            🧠 AI Quiz
        </h1>

        <p>
            Test your understanding with AI-generated questions.
        </p>

    </div>


    <div class="quiz-card">

        <div
            class="question-card"
            id="questionCard">

            No Quiz Found

        </div>


        <div
            id="optionsContainer"
            class="options-container">

        </div>


        <button
            class="next-btn"
            onclick="nextQuestion()">

            Next Question →

        </button>


        <div
            class="score-box">

            <h2 id="scoreText">

                Score: 0

            </h2>

        </div>

    </div>


    <div class="dashboard-box">

        <p>

            Need other study tools?

        </p>

        <button
            class="dashboard-btn"
            onclick="window.location.href='dashboard.html'">

            🏠 Back to Dashboard

        </button>

    </div>

</div>

<script src="js/quiz.js"></script>

</body>

</html>
