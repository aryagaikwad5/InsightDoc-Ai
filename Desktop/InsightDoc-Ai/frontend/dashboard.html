<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        InsightDoc Dashboard
    </title>

    <link
        rel="stylesheet"
        href="css/dashboard.css">

</head>

<body>

<div class="container">

    <div class="main">

        <!-- Hero Section -->

        <div class="hero-card">

            <div class="hero-left">

                <h1>
                    📚 InsightDoc AI
                </h1>

                <p class="hero-text">
                    Learn Smarter with AI
                </p>

                <p
                    class="welcome-text"
                    id="welcomeUser">

                    Welcome back 👋

                </p>

            </div>


            <div class="hero-right">

                <div
                    class="profile-dropdown">

                    <button
                        class="profile-btn"
                        onclick="toggleDropdown()">

                        <div
                            class="avatar"
                            id="avatarInitial">

                            A

                        </div>

                    </button>
                    

                    <div
                        class="dropdown-menu"
                        id="dropdownMenu">

                        <button
                            class="username-item"
                            id="dropdownUsername">

                            👤 User

                        </button>

                        <button
                            onclick="logout()">

                            🚪 Logout

                        </button>

                    </div>

                </div>


                <button
                    class="upload-main-btn"
                    onclick="location.href='upload.html'">

                    📤 Upload New Document

                </button>

            </div>

        </div>


        <!-- Current Document -->

        <div class="card">

            <h2>
                📄 Current Document
            </h2>

            <p
                id="filename"
                class="filename">

                Filename: -

            </p>

            <p
                id="wordCount"
                class="wordcount">

                Word Count: -

            </p>

        </div>


        <!-- Quick Actions -->

        <h2 class="section-title">

            ⚡ Quick Actions

        </h2>

        <div class="tools">

            <div
                class="tool-card"
                onclick="location.href='flashcards.html'">

                <h3>
                    🃏 Flashcards
                </h3>

                <p>

                    Review concepts quickly

                </p>

            </div>

            <div
                class="tool-card"
                onclick="location.href='quiz.html'">

                <h3>
                    🧠 Quiz
                </h3>

                <p>

                    Test your knowledge

                </p>

            </div>

            <div
                class="tool-card"
                onclick="location.href='chat.html'">

                <h3>
                    💬 AI Chat
                </h3>

                <p>

                    Ask questions instantly

                </p>

            </div>

            

        </div>


        <!-- Recent Documents -->

        <div class="activity">

            <h2>

                📚 Recent Study Sessions

            </h2>

            <br>

            <div id="historyList">

                No documents found.

            </div>

        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
