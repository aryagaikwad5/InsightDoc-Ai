<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        InsightDoc Dashboard
    </title>

    <link
        rel="stylesheet"
        href="css/dashboard.css">

</head>

<body>

<div class="container">

    <h1>
        📚 InsightDoc Dashboard
    </h1>

    <div class="card">

        <h2>
            📄 Uploaded Document
        </h2>

        <p id="filename">

            Filename: -

        </p>

        <p id="wordCount">

            Word Count: -

        </p>

    </div>

    <div class="card">

        <h2>
            Quick Actions
        </h2>

        <button onclick="location.href='upload.html'">
            Upload
        </button>

        <button onclick="location.href='flashcards.html'">
            Flashcards
        </button>

        <button onclick="location.href='quiz.html'">
            Quiz
        </button>

        <button onclick="location.href='chat.html'">
            Chat
        </button>

    </div>


    <div class="card">

        <h2>
            📚 Recent Documents
        </h2>

        <div id="historyList">

            No documents found.

        </div>

    </div>
</div>

<script src="js/dashboard.js"></script>

</body>

</html>
