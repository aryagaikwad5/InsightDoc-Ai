<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        AI Chat
    </title>

    <link
        rel="stylesheet"
        href="css/chat.css">

</head>

<body>

<div class="chat-container">

    <div class="chat-header">

        🤖 InsightDoc AI Chat

        <div class="document-info">

            📄 Studying:
            <span id="documentName">
                No document selected
            </span>

        </div>

    </div>

    <div class="prompt-chips">

        <button onclick="usePrompt('Summarize this document simply.')">
            📝 Summarize
        </button>

        <button onclick="usePrompt('What are the important exam questions?')">
            🎯 Exam Questions
        </button>

        <button onclick="usePrompt('Explain this topic in simple language.')">
            💡 Explain Simply
        </button>

        <button onclick="usePrompt('Give me key concepts from this document.')">
            📌 Key Concepts
        </button>

    </div>

    <div
        class="chat-box"
        id="chatBox">

        <div class="bot-message">

            Hello! Ask me anything about your uploaded document.

        </div>

    </div>

    <div class="chat-actions">

        <button
            class="dashboard-btn"
            onclick="window.location.href='dashboard.html'">

            🏠 Dashboard

        </button>

        <button
            class="clear-btn"
            onclick="clearChat()">

            🗑 Clear Chat

        </button>

    </div>

    <div class="chat-input-area">

        <input
            type="text"
            id="userInput"
            placeholder="Ask a question...">

        <button
            id="sendBtn"
            onclick="sendMessage()">

            Send

        </button>

    </div>

</div>

<script>

window.addEventListener(
    "pageshow",
    function(){

        if(
            !localStorage.getItem("user")
        ){

            window.location.replace(
                "index.html"
            );

        }

    }
);

</script>

<script src="js/chat.js"></script>



</body>

</html>
