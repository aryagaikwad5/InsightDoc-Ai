<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        AI Chat
    </title>

    <link
        rel="stylesheet"
        href="css/chat.css">

</head>

<body>

<div class="chat-container">

    <div class="chat-header">

        🤖 InsightDoc AI Chat

    </div>

    <div
        class="chat-box"
        id="chatBox">

        <div class="bot-message">

            Hello! Ask me anything about your uploaded document.

        </div>

    </div>

    <div class="chat-input-area">

        <input
            type="text"
            id="userInput"
            placeholder="Ask a question...">

        <button
            onclick="sendMessage()">

            Send

        </button>

    </div>

</div>

<script src="js/chat.js"></script>

</body>

</html>
