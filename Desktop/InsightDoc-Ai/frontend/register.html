<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>InsightDoc AI Register</title>

    <link rel="stylesheet" href="css/auth.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">

            InsightDoc AI

        </div>

        <div class="subtitle">

            Start learning smarter with InsightDoc.

        </div>

        <form id="registerForm">

            <div class="input-group">

                <label>Username</label>

                <input
                    type="text"
                    id="regUsername"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <div class="password-container">

                    <input
                        type="password"
                        id="regPassword"
                        required
                    >

                    <span
                    class="toggle-password"
                    onclick="togglePassword('regPassword', this)"
                    >
                        Show
                    </span>

                </div>

                <small class="password-note">

                    Minimum 8 characters, including uppercase, lowercase, number and special character.

                </small>

            </div>

            <button
                class="btn"
                type="submit"
            >

                Create Account

            </button>

        </form>

        <div
            class="message"
            id="message"
        ></div>

        <div class="link">

            Already have an account?

            <a href="index.html">

                Login

            </a>

        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
