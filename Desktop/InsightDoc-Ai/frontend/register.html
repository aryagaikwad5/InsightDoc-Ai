<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">
            InsightDoc AI
        </div>

        <div class="subtitle">
            Create Account
        </div>

        <form id="registerForm">

            <div class="input-group">

                <label>Username</label>

                <input
                    type="text"
                    id="regUsername"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="regPassword"
                    required
                >

            </div>

            <button class="btn">
                Register
            </button>

        </form>

        <div class="message" id="message"></div>

        <div class="link">
            <a href="index.html">
                Back To Login
            </a>
        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
